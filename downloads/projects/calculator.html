<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator App - Code4Boy Starter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a1a2e; }
    .calculator { width: 320px; background: #16213e; border-radius: 20px; padding: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .display { background: #0f3460; border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: right; min-height: 80px; display: flex; flex-direction: column; justify-content: flex-end; }
    .display .previous { color: #888; font-size: 0.9rem; min-height: 20px; }
    .display .current { color: #fff; font-size: 2rem; font-weight: 700; word-break: break-all; }
    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .btn { padding: 18px; font-size: 1.1rem; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: 600; }
    .btn:hover { transform: scale(1.05); }
    .btn:active { transform: scale(0.95); }
    .btn-num { background: #1a1a3e; color: #fff; }
    .btn-num:hover { background: #2a2a5e; }
    .btn-op { background: #e94560; color: #fff; }
    .btn-op:hover { background: #ff6b81; }
    .btn-func { background: #533483; color: #fff; }
    .btn-func:hover { background: #6b44a0; }
    .btn-eq { background: #00b4d8; color: #fff; grid-column: span 2; }
    .btn-eq:hover { background: #48cae4; }
    .history { margin-top: 15px; max-height: 120px; overflow-y: auto; }
    .history h4 { color: #888; font-size: 0.8rem; margin-bottom: 8px; }
    .history-item { color: #aaa; font-size: 0.8rem; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="previous" id="previous"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="buttons">
      <button class="btn btn-func" onclick="clearAll()">AC</button>
      <button class="btn btn-func" onclick="deleteLast()">DEL</button>
      <button class="btn btn-func" onclick="toggleSign()">+/-</button>
      <button class="btn btn-op" onclick="setOp('/')">/</button>
      <button class="btn btn-num" onclick="appendNum('7')">7</button>
      <button class="btn btn-num" onclick="appendNum('8')">8</button>
      <button class="btn btn-num" onclick="appendNum('9')">9</button>
      <button class="btn btn-op" onclick="setOp('*')">x</button>
      <button class="btn btn-num" onclick="appendNum('4')">4</button>
      <button class="btn btn-num" onclick="appendNum('5')">5</button>
      <button class="btn btn-num" onclick="appendNum('6')">6</button>
      <button class="btn btn-op" onclick="setOp('-')">-</button>
      <button class="btn btn-num" onclick="appendNum('1')">1</button>
      <button class="btn btn-num" onclick="appendNum('2')">2</button>
      <button class="btn btn-num" onclick="appendNum('3')">3</button>
      <button class="btn btn-op" onclick="setOp('+')">+</button>
      <button class="btn btn-num" onclick="appendNum('0')">0</button>
      <button class="btn btn-num" onclick="appendNum('.')">.</button>
      <button class="btn btn-eq" onclick="calculate()">=</button>
    </div>
    <div class="history">
      <h4>History</h4>
      <div id="history-list"></div>
    </div>
  </div>
  <script>
    let current = '0', previous = '', operation = null, history = [];
    const currentEl = document.getElementById('current');
    const previousEl = document.getElementById('previous');
    const historyList = document.getElementById('history-list');

    function updateDisplay() {
      currentEl.textContent = current;
      previousEl.textContent = previous ? `${previous} ${operation || ''}` : '';
    }

    function appendNum(num) {
      if (num === '.' && current.includes('.')) return;
      if (current === '0' && num !== '.') current = num;
      else current += num;
      updateDisplay();
    }

    function setOp(op) {
      if (current === '') return;
      if (previous !== '') calculate();
      operation = op;
      previous = current;
      current = '';
      updateDisplay();
    }

    function calculate() {
      if (!operation || previous === '') return;
      const a = parseFloat(previous), b = parseFloat(current);
      let result;
      switch(operation) {
        case '+': result = a + b; break;
        case '-': result = a - b; break;
        case '*': result = a * b; break;
        case '/': result = b !== 0 ? a / b : 'Error'; break;
      }
      const expr = `${previous} ${operation} ${current} = ${result}`;
      history.unshift(expr);
      if (history.length > 10) history.pop();
      historyList.innerHTML = history.map(h => `<div class="history-item">${h}</div>`).join('');
      current = String(result);
      previous = '';
      operation = null;
      updateDisplay();
    }

    function clearAll() { current = '0'; previous = ''; operation = null; updateDisplay(); }
    function deleteLast() { current = current.slice(0, -1) || '0'; updateDisplay(); }
    function toggleSign() { current = String(-parseFloat(current)); updateDisplay(); }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9' || e.key === '.') appendNum(e.key);
      else if (['+','-','*','/'].includes(e.key)) setOp(e.key);
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Backspace') deleteLast();
      else if (e.key === 'Escape') clearAll();
    });
  </script>
</body>
</html>
