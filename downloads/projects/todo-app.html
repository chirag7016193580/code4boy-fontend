<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App - Code4Boy Starter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; background: #1a1a2e; color: #e0e0e0; display: flex; justify-content: center; padding: 40px 20px; }
    .app { width: 100%; max-width: 500px; }
    h1 { text-align: center; font-size: 2rem; margin-bottom: 30px; background: linear-gradient(90deg, #00f0ff, #8b00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .input-row input { flex: 1; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 1rem; outline: none; }
    .input-row input:focus { border-color: #00f0ff; }
    .input-row button { padding: 12px 20px; background: #00f0ff; color: #1a1a2e; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1rem; }
    .input-row button:hover { background: #48cae4; }
    .filters { display: flex; gap: 8px; margin-bottom: 20px; }
    .filter-btn { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #888; cursor: pointer; font-size: 0.85rem; }
    .filter-btn.active { background: rgba(0,240,255,0.1); border-color: #00f0ff; color: #00f0ff; }
    .stats { display: flex; justify-content: space-between; padding: 12px 16px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 20px; font-size: 0.85rem; color: #888; }
    .todo-list { list-style: none; }
    .todo-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; margin-bottom: 8px; transition: 0.3s; }
    .todo-item:hover { border-color: rgba(0,240,255,0.2); }
    .todo-item.done { opacity: 0.5; }
    .todo-item.done .todo-text { text-decoration: line-through; }
    .todo-check { width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .todo-item.done .todo-check { background: #00f0ff; border-color: #00f0ff; }
    .todo-item.done .todo-check::after { content: '\\2713'; color: #1a1a2e; font-size: 0.8rem; font-weight: bold; }
    .todo-text { flex: 1; font-size: 0.95rem; }
    .todo-cat { font-size: 0.7rem; padding: 3px 8px; background: rgba(139,0,255,0.15); border-radius: 12px; color: #8b00ff; }
    .todo-delete { background: none; border: none; color: #e94560; cursor: pointer; font-size: 1.1rem; opacity: 0; transition: 0.2s; }
    .todo-item:hover .todo-delete { opacity: 1; }
    select { padding: 12px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 0.9rem; outline: none; }
    select option { background: #1a1a2e; }
    .empty { text-align: center; padding: 40px; color: #555; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Todo App</h1>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="What needs to be done?">
      <select id="catSelect">
        <option value="general">General</option>
        <option value="work">Work</option>
        <option value="personal">Personal</option>
        <option value="study">Study</option>
      </select>
      <button onclick="addTodo()">Add</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>
    <div class="stats">
      <span id="stats-total">0 tasks</span>
      <span id="stats-done">0 completed</span>
    </div>
    <ul class="todo-list" id="todoList"></ul>
  </div>
  <script>
    let todos = JSON.parse(localStorage.getItem('c4b-todos') || '[]');
    let filter = 'all';

    function save() { localStorage.setItem('c4b-todos', JSON.stringify(todos)); }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t => filter === 'all' ? true : filter === 'done' ? t.done : !t.done);
      
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">No tasks here yet</div>';
      } else {
        list.innerHTML = filtered.map((t, i) => `
          <li class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
            <div class="todo-check" onclick="toggleTodo(${t.id})"></div>
            <span class="todo-text">${escapeHtml(t.text)}</span>
            <span class="todo-cat">${t.category}</span>
            <button class="todo-delete" onclick="deleteTodo(${t.id})">&#10005;</button>
          </li>
        `).join('');
      }

      document.getElementById('stats-total').textContent = `${todos.length} tasks`;
      document.getElementById('stats-done').textContent = `${todos.filter(t => t.done).length} completed`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: Date.now(), text, category: document.getElementById('catSelect').value, done: false });
      input.value = '';
      save(); render();
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.done = !todo.done;
      save(); render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save(); render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('todoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
    render();
  </script>
</body>
</html>
